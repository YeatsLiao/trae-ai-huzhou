<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪天空 - 情绪趋势</title>
    <style id="theme-vars">
:root {
  /* ===== Brand Colors ===== */
  --color-bg-primary: #0a0e1a;
  --color-bg-secondary: #111827;
  --color-bg-tertiary: #1a1f35;
  --color-bg-card: rgba(17, 24, 39, 0.85);
  --color-bg-card-hover: rgba(26, 31, 53, 0.95);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0a0e1a;

  /* Accent Colors */
  --color-sky: #38bdf8;
  --color-purple: #a78bfa;
  --color-pink: #f472b6;

  /* Emotion Colors */
  --color-emotion-happy: #fbbf24;
  --color-emotion-calm: #38bdf8;
  --color-emotion-anxious: #9ca3af;
  --color-emotion-sad: #7c3aed;
  --color-emotion-angry: #ef4444;
  --color-emotion-lost: #e2e8f0;
  --color-emotion-tired: #f97316;
  --color-emotion-energetic: #22d3ee;

  /* Glow & Effects */
  --glow-happy: 0 0 20px rgba(251, 191, 36, 0.5);
  --glow-calm: 0 0 20px rgba(56, 189, 248, 0.5);
  --glow-anxious: 0 0 20px rgba(156, 163, 175, 0.4);
  --glow-sad: 0 0 20px rgba(124, 58, 237, 0.5);
  --glow-angry: 0 0 20px rgba(239, 68, 68, 0.5);
  --glow-lost: 0 0 20px rgba(226, 232, 240, 0.4);
  --glow-tired: 0 0 20px rgba(249, 115, 22, 0.5);
  --glow-energetic: 0 0 20px rgba(34, 211, 238, 0.5);

  /* Semantic */
  --color-border: rgba(148, 163, 184, 0.15);
  --color-border-active: rgba(56, 189, 248, 0.4);

  /* ===== Typography ===== */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;

  --text-xs: 0.625rem;    /* 10px */
  --text-sm: 0.75rem;     /* 12px */
  --text-base: 0.875rem;  /* 14px */
  --text-lg: 1rem;        /* 16px */
  --text-xl: 1.125rem;    /* 18px */
  --text-2xl: 1.25rem;    /* 20px */

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  /* ===== Spacing ===== */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* ===== Radius ===== */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ===== Shadows ===== */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.5);
}

/* ===== Typography Classes ===== */
.brand-heading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-subheading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-semibold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-body {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.brand-caption {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-relaxed);
  color: var(--color-text-tertiary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-bg-primary);
    --color-foreground: var(--color-text-primary);
    --color-card: var(--color-bg-card);
    --color-primary: var(--color-sky);
    --color-primary-foreground: var(--color-text-inverse);
    --color-secondary: var(--color-bg-secondary);
    --color-muted: var(--color-bg-tertiary);
    --color-muted-foreground: var(--color-text-secondary);
    --color-accent: var(--color-purple);
    --color-border: var(--color-border);
    --color-ring: var(--color-sky);
    --radius-sm: var(--radius-sm);
    --radius-md: var(--radius-md);
    --radius-lg: var(--radius-lg);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="relative w-full min-h-screen flex flex-col" style="background: var(--color-bg-primary); font-family: var(--font-family);">

        <!-- Top Header -->
        <header class="sticky top-0 z-30 flex items-center justify-between px-4" style="height: 48px; background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border);">
            <button class="w-9 h-9 flex items-center justify-center" style="color: var(--color-text-secondary);" data-dom-id="btn-back-home" aria-label="返回首页">
                <svg class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="12 4 6 10 12 16"/>
                </svg>
            </button>
            <span class="text-base font-semibold" style="color: var(--color-text-primary);">情绪时间线</span>
            <div class="w-9 h-9"></div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto pb-20">

            <!-- Tab Switcher -->
            <div class="px-4 pt-3 pb-1">
                <div class="inline-flex p-1 gap-1" style="background: rgba(148, 163, 184, 0.1); border-radius: var(--radius-md);">
                    <button class="tab-switch-btn px-4 py-1.5 text-xs font-semibold whitespace-nowrap" style="border-radius: var(--radius-sm); background: var(--color-sky); color: var(--color-text-inverse); transition: background 240ms cubic-bezier(.3,0,0,1), color 240ms cubic-bezier(.3,0,0,1);" data-tab-target="panel-my-emotions" aria-label="我的情绪" onclick="switchTab('panel-my-emotions','panel-city-trends',this)">
                        我的情绪
                    </button>
                    <button class="tab-switch-btn px-4 py-1.5 text-xs font-semibold whitespace-nowrap" style="border-radius: var(--radius-sm); background: transparent; color: var(--color-text-tertiary); transition: background 240ms cubic-bezier(.3,0,0,1), color 240ms cubic-bezier(.3,0,0,1);" data-tab-target="panel-city-trends" aria-label="城市趋势" onclick="switchTab('panel-city-trends','panel-my-emotions',this)">
                        城市趋势
                    </button>
                </div>
            </div>

            <!-- Panel: My Emotions (default visible) -->
            <div id="panel-my-emotions" class="tab-panel-visible">

                <!-- Section: Emotion Calendar -->
                <section class="px-4 pt-4 pb-1">
                    <div class="flex gap-2 justify-between">
                        <!-- Mon -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                    <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                    <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周一</span>
                        </div>
                        <!-- Tue -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="4" cy="4" r="2" fill="var(--color-emotion-happy)" opacity="0.7"/>
                                    <path d="M6.5 4.5C6.5 4.5 8 5 8 6.5" stroke="var(--color-text-tertiary)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
                                    <circle cx="3" cy="6" r="0.6" fill="var(--color-text-tertiary)" opacity="0.5"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周二</span>
                        </div>
                        <!-- Wed -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                    <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                    <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周三</span>
                        </div>
                        <!-- Thu -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="5" cy="3.5" r="2" fill="var(--color-emotion-calm)"/>
                                    <line x1="4" y1="6" x2="3" y2="8" stroke="var(--color-emotion-calm)" stroke-width="0.7" stroke-linecap="round"/>
                                    <line x1="6" y1="6" x2="5.5" y2="8.5" stroke="var(--color-emotion-calm)" stroke-width="0.7" stroke-linecap="round"/>
                                    <line x1="8" y1="5.5" x2="7.5" y2="8" stroke="var(--color-emotion-calm)" stroke-width="0.7" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周四</span>
                        </div>
                        <!-- Fri -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="7" cy="3" r="2" fill="var(--color-emotion-sad)" opacity="0.8"/>
                                    <polyline points="5,6 7,4.5 6,6" stroke="var(--color-emotion-sad)" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                                    <line x1="5" y1="8" x2="7" y2="8" stroke="var(--color-emotion-sad)" stroke-width="0.7" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周五</span>
                        </div>
                        <!-- Sat -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                    <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                    <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs" style="color: var(--color-text-tertiary);">周六</span>
                        </div>
                        <!-- Sun (Today) -->
                        <div class="flex flex-col items-center gap-1.5">
                            <div class="w-10 h-10 flex items-center justify-center emotion-today" style="background: var(--color-bg-tertiary); border-radius: var(--radius-sm); border: 1.5px solid var(--color-sky); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);">
                                <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none">
                                    <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                    <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                    <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium" style="color: var(--color-sky);">今天</span>
                        </div>
                    </div>
                </section>

                <!-- Section: Emotion Trend Line Chart -->
                <section class="px-4 pt-5 pb-2">
                    <h2 class="text-sm font-medium mb-3" style="color: var(--color-text-secondary);">情绪变化</h2>
                    <div class="p-4" style="background: rgba(10, 14, 26, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: var(--radius-lg);">
                        <svg viewBox="0 0 300 120" class="w-full" style="overflow: visible;" preserveAspectRatio="xMidYMid meet">
                            <defs>
                                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="var(--color-sky)"/>
                                    <stop offset="50%" stop-color="var(--color-purple)"/>
                                    <stop offset="100%" stop-color="var(--color-pink)"/>
                                </linearGradient>
                                <linearGradient id="areaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="var(--color-sky)" stop-opacity="0.1"/>
                                    <stop offset="50%" stop-color="var(--color-purple)" stop-opacity="0.1"/>
                                    <stop offset="100%" stop-color="var(--color-pink)" stop-opacity="0.1"/>
                                </linearGradient>
                                <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="url(#areaGrad)" stop-opacity="0.15"/>
                                    <stop offset="100%" stop-color="url(#areaGrad)" stop-opacity="0"/>
                                </linearGradient>
                            </defs>
                            <!-- Grid lines (3 horizontal dashed) -->
                            <line x1="20" y1="20" x2="280" y2="20" stroke="rgba(148,163,184,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>
                            <line x1="20" y1="50" x2="280" y2="50" stroke="rgba(148,163,184,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>
                            <line x1="20" y1="80" x2="280" y2="80" stroke="rgba(148,163,184,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>
                            <!-- Area fill under line -->
                            <polygon points="40,38.4 80,53.6 120,32 160,70 200,77.6 240,36.8 280,44.8 280,95 40,95" fill="url(#areaGrad)" opacity="0.6"/>
                            <!-- Line -->
                            <polyline points="40,38.4 80,53.6 120,32 160,70 200,77.6 240,36.8 280,44.8" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <!-- Data points -->
                            <!-- Mon 78% -->
                            <circle cx="40" cy="38.4" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-emotion-happy)" stroke-width="1.5"/>
                            <!-- Tue 62% -->
                            <circle cx="80" cy="53.6" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-text-tertiary)" stroke-width="1.5"/>
                            <!-- Wed 85% -->
                            <circle cx="120" cy="32" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-emotion-happy)" stroke-width="1.5"/>
                            <!-- Thu 45% -->
                            <circle cx="160" cy="70" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-emotion-calm)" stroke-width="1.5"/>
                            <!-- Fri 38% -->
                            <circle cx="200" cy="77.6" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-emotion-sad)" stroke-width="1.5"/>
                            <!-- Sat 82% -->
                            <circle cx="240" cy="36.8" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-emotion-happy)" stroke-width="1.5"/>
                            <!-- Sun 72% (today) -->
                            <circle cx="280" cy="44.8" r="3.5" fill="var(--color-bg-primary)" stroke="var(--color-sky)" stroke-width="1.5" style="filter: drop-shadow(0 0 4px rgba(56,189,248,0.4));"/>
                            <!-- X-axis labels -->
                            <text x="40" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周一</text>
                            <text x="80" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周二</text>
                            <text x="120" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周三</text>
                            <text x="160" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周四</text>
                            <text x="200" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周五</text>
                            <text x="240" y="110" fill="var(--color-text-tertiary)" font-size="9" text-anchor="middle" font-family="var(--font-family)">周六</text>
                            <text x="280" y="110" fill="var(--color-sky)" font-size="9" text-anchor="middle" font-family="var(--font-family)" font-weight="500">今天</text>
                        </svg>
                    </div>
                </section>
            </div>

            <!-- Panel: City Trends (hidden by default) -->
            <div id="panel-city-trends" class="tab-panel-hidden">

                <!-- Section: City Emotion Ranking -->
                <section class="px-4 pt-5 pb-2">
                    <h2 class="text-sm font-medium mb-3" style="color: var(--color-text-secondary);">城市情绪排行</h2>
                    <div class="p-1" style="background: rgba(10, 14, 26, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: var(--radius-lg);">
                        <!-- Rank 1 -->
                        <div class="flex items-center px-3 py-2.5" style="border-radius: var(--radius-sm);">
                            <span class="w-5 text-xs font-bold" style="color: var(--color-sky);">1</span>
                            <span class="flex-1 text-sm font-medium ml-3" style="color: var(--color-text-primary);">深圳</span>
                            <svg class="w-4 h-4 mx-2" viewBox="0 0 12 12" fill="none">
                                <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                            </svg>
                            <span class="text-xs font-semibold" style="color: var(--color-sky);">85%</span>
                        </div>
                        <!-- Rank 2 -->
                        <div class="flex items-center px-3 py-2.5" style="background: rgba(148, 163, 184, 0.04); border-radius: var(--radius-sm);">
                            <span class="w-5 text-xs font-bold" style="color: var(--color-sky);">2</span>
                            <span class="flex-1 text-sm font-medium ml-3" style="color: var(--color-text-primary);">杭州</span>
                            <svg class="w-4 h-4 mx-2" viewBox="0 0 12 12" fill="none">
                                <circle cx="4" cy="4" r="2" fill="var(--color-emotion-happy)" opacity="0.7"/>
                                <path d="M6.5 4.5C6.5 4.5 8 5 8 6.5" stroke="var(--color-text-tertiary)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
                                <circle cx="3" cy="6" r="0.6" fill="var(--color-text-tertiary)" opacity="0.5"/>
                            </svg>
                            <span class="text-xs font-semibold" style="color: var(--color-sky);">78%</span>
                        </div>
                        <!-- Rank 3 -->
                        <div class="flex items-center px-3 py-2.5" style="border-radius: var(--radius-sm);">
                            <span class="w-5 text-xs font-bold" style="color: var(--color-sky);">3</span>
                            <span class="flex-1 text-sm font-medium ml-3" style="color: var(--color-text-primary);">成都</span>
                            <svg class="w-4 h-4 mx-2" viewBox="0 0 12 12" fill="none">
                                <circle cx="6" cy="4" r="2.5" fill="var(--color-emotion-happy)"/>
                                <line x1="6" y1="7" x2="6" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                                <line x1="3.5" y1="9" x2="8.5" y2="9" stroke="var(--color-emotion-happy)" stroke-width="0.8" stroke-linecap="round"/>
                            </svg>
                            <span class="text-xs font-semibold" style="color: var(--color-sky);">75%</span>
                        </div>
                        <!-- Rank 4 -->

    <!-- Custom CSS (placed before </body> per hard rules) -->
    <style>
        /* Tab panel visibility */
        .tab-panel-hidden { display: none; }
        .tab-panel-visible { display: block; }

        /* Tab switch active state */
        .tab-switch-btn.active {
            background: var(--color-sky) !important;
            color: var(--color-text-inverse) !important;
        }

        /* Bottom tab underline indicator */
        .tab-underline {
            width: 0;
            height: 2px;
            border-radius: 1px;
            transition: width 240ms cubic-bezier(.3,0,0,1);
        }
        .tab-btn.active .tab-underline {
            width: 16px;
            background: var(--color-sky);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* Bar glow animation on load */
        .emotion-bar {
            animation: barGlow 1.2s cubic-bezier(.3,0,0,1) both;
        }
        @keyframes barGlow {
            from { width: 0; }
        }

        /* Today cell pulse */
        .emotion-today {
            animation: todayPulse 2.5s ease-in-out infinite;
        }
        @keyframes todayPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
            50% { box-shadow: 0 0 16px rgba(56, 189, 248, 0.35); }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .emotion-bar,
            .emotion-today,
            .tab-underline {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    <script>
        function switchTab(showId, hideId, btn) {
            var showPanel = document.getElementById(showId);
            var hidePanel = document.getElementById(hideId);
            if (showPanel) { showPanel.className = 'tab-panel-visible'; }
            if (hidePanel) { hidePanel.className = 'tab-panel-hidden'; }
            var btns = btn.parentElement.querySelectorAll('.tab-switch-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
                btns[i].style.background = 'transparent';
                btns[i].style.color = 'var(--color-text-tertiary)';
            }
            btn.classList.add('active');
            btn.style.background = 'var(--color-sky)';
            btn.style.color = 'var(--color-text-inverse)';
        }
    </script>
    <script>lucide.createIcons();</script>
