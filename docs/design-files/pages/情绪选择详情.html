    <style id="theme-vars">
:root {
  /* ===== Brand Colors ===== */
  --color-bg-primary: #0a0e1a;
  --color-bg-secondary: #111827;
  --color-bg-tertiary: #1a1f35;
  --color-bg-card: rgba(17, 24, 39, 0.85);
  --color-bg-card-hover: rgba(26, 31, 53, 0.95);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0a0e1a;

  /* Accent Colors */
  --color-sky: #38bdf8;
  --color-purple: #a78bfa;
  --color-pink: #f472b6;

  /* Emotion Colors */
  --color-emotion-happy: #fbbf24;
  --color-emotion-calm: #38bdf8;
  --color-emotion-anxious: #9ca3af;
  --color-emotion-sad: #7c3aed;
  --color-emotion-angry: #ef4444;
  --color-emotion-lost: #e2e8f0;
  --color-emotion-tired: #f97316;
  --color-emotion-energetic: #22d3ee;

  /* Glow & Effects */
  --glow-happy: 0 0 20px rgba(251, 191, 36, 0.5);
  --glow-calm: 0 0 20px rgba(56, 189, 248, 0.5);
  --glow-anxious: 0 0 20px rgba(156, 163, 175, 0.4);
  --glow-sad: 0 0 20px rgba(124, 58, 237, 0.5);
  --glow-angry: 0 0 20px rgba(239, 68, 68, 0.5);
  --glow-lost: 0 0 20px rgba(226, 232, 240, 0.4);
  --glow-tired: 0 0 20px rgba(249, 115, 22, 0.5);
  --glow-energetic: 0 0 20px rgba(34, 211, 238, 0.5);

  /* Semantic */
  --color-border: rgba(148, 163, 184, 0.15);
  --color-border-active: rgba(56, 189, 248, 0.4);

  /* ===== Typography ===== */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;

  --text-xs: 0.625rem;    /* 10px */
  --text-sm: 0.75rem;     /* 12px */
  --text-base: 0.875rem;  /* 14px */
  --text-lg: 1rem;        /* 16px */
  --text-xl: 1.125rem;    /* 18px */
  --text-2xl: 1.25rem;    /* 20px */

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  /* ===== Spacing ===== */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* ===== Radius ===== */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ===== Shadows ===== */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.5);
}

/* ===== Typography Classes ===== */
.brand-heading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-subheading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-semibold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-body {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.brand-caption {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-relaxed);
  color: var(--color-text-tertiary);
}

                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 16s-1.5-2-4-2-4 2-4 2"></path><line x1="9" y1="9" x2="9.01" y2="9.05"></line><line x1="15" y1="9" x2="15.01" y2="9.05"></line></svg>
                </div>
                <span class="font-semibold" style="font-size: var(--text-sm); color: var(--color-text-primary);">疲惫</span>
                <span class="mt-0.5" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">夕阳西沉</span>
              </div>
            </div>

            <!-- 8. 充满活力 (Energetic) -->
            <div class="emotion-card relative flex flex-col cursor-pointer" data-emotion="energetic" style="background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--color-border); border-radius: var(--radius-lg); opacity: 0.6; transition: transform 240ms cubic-bezier(.3,0,0,1), opacity 240ms cubic-bezier(.3,0,0,1), box-shadow 240ms cubic-bezier(.3,0,0,1), border-color 240ms cubic-bezier(.3,0,0,1);">
              <div class="relative overflow-hidden shrink-0" style="height: 70px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; background: linear-gradient(180deg, #22d3ee, #06b6d4);">
                <div class="absolute inset-0 flex items-center justify-center">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ecfeff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </div>
              </div>
              <div class="flex flex-col items-center py-2.5 px-2 flex-1">
                <div class="w-8 h-8 rounded-full flex items-center justify-center mb-1.5" style="background: rgba(34, 211, 238, 0.2);">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                </div>
                <span class="font-semibold" style="font-size: var(--text-sm); color: var(--color-text-primary);">充满活力</span>
                <span class="mt-0.5" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">星光闪烁</span>
              </div>
            </div>

          </div>

          <!-- Confirmation Area -->
          <div class="mt-5 flex flex-col gap-3">
            <!-- Optional text input -->
            <input type="text" placeholder="添加一句话描述你的心情..." maxlength="100" class="w-full px-4 py-3 text-sm outline-none placeholder-opacity-50" style="background: var(--color-bg-tertiary); border: 1px solid var(--color-border); border-radius: var(--radius-full); color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family);">

            <!-- Confirm button -->
            <button class="w-full py-3.5 font-medium text-base whitespace-nowrap flex items-center justify-center" style="background: linear-gradient(135deg, #38bdf8, #a78bfa); color: #ffffff; border-radius: var(--radius-lg); box-shadow: 0 0 24px rgba(56, 189, 248, 0.3); font-size: var(--text-base); font-family: var(--font-family); transition: transform 120ms cubic-bezier(.2,.8,.2,1), box-shadow 120ms cubic-bezier(.2,.8,.2,1);" onmouseenter="this.style.transform='translateY(-1px)';this.style.boxShadow='0 0 32px rgba(56,189,248,0.4)'" onmouseleave="this.style.transform='translateY(0)';this.style.boxShadow='0 0 24px rgba(56,189,248,0.3)'" onmousedown="this.style.transform='scale(0.98)'" onmouseup="this.style.transform='translateY(0)'">
              确认我的心情
            </button>

            <!-- Skip button -->
            <div class="flex justify-center pt-1">
              <button data-dom-id="btn-skip" class="text-sm whitespace-nowrap" style="color: var(--color-text-tertiary); font-size: var(--text-sm); font-family: var(--font-family); background: none; border: none; cursor: pointer; text-decoration: none; transition: color 120ms cubic-bezier(.2,.8,.2,1);" onmouseenter="this.style.textDecoration='underline';this.style.color='var(--color-text-secondary)'" onmouseleave="this.style.textDecoration='none';this.style.color='var(--color-text-tertiary)'">
                跳过，只查看
              </button>
            </div>
          </div>

          <!-- Bottom safe area spacer -->
          <div class="h-4"></div>

        </div>

      </div>

    </main>

    <!-- Animations -->
    <style>
      @keyframes sunRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: var(--glow-happy); }
        50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.7); }
      }
      @keyframes lightningFlash {
        0%, 90%, 100% { opacity: 1; }
        92%, 96% { opacity: 0.2; }
        94% { opacity: 1; }
      }
      @keyframes rainFall {
        0% { transform: translateY(-2px); opacity: 0.6; }
        50% { opacity: 1; }
        100% { transform: translateY(3px); opacity: 0.4; }
      }
      .emotion-card.selected {
        animation: pulseGlow 2.4s ease-in-out infinite;
      }
      .sun-rotate {
        animation: sunRotate 12s linear infinite;
      }
      .lightning-flash {
        animation: lightningFlash 3s ease-in-out infinite;
      }
      .rain-drops line {
        animation: rainFall 1.2s ease-in-out infinite;
      }
      .rain-drops line:nth-child(1) { animation-delay: 0s; }
      .rain-drops line:nth-child(2) { animation-delay: 0.3s; }
      .rain-drops line:nth-child(3) { animation-delay: 0.6s; }
      @media (prefers-reduced-motion: reduce) {
        .emotion-card.selected { animation: none; }
        .sun-rotate { animation: none; }
        .lightning-flash { animation: none; }
        .rain-drops line { animation: none; }
        .emotion-card { transition-duration: 0.01ms !important; }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
