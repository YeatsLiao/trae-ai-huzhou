    <style id="theme-vars">
:root {
  /* ===== Brand Colors ===== */
  --color-bg-primary: #0a0e1a;
  --color-bg-secondary: #111827;
  --color-bg-tertiary: #1a1f35;
  --color-bg-card: rgba(17, 24, 39, 0.85);
  --color-bg-card-hover: rgba(26, 31, 53, 0.95);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0a0e1a;

  /* Accent Colors */
  --color-sky: #38bdf8;
  --color-purple: #a78bfa;
  --color-pink: #f472b6;

  /* Emotion Colors */
  --color-emotion-happy: #fbbf24;
  --color-emotion-calm: #38bdf8;
  --color-emotion-anxious: #9ca3af;
  --color-emotion-sad: #7c3aed;
  --color-emotion-angry: #ef4444;
  --color-emotion-lost: #e2e8f0;
  --color-emotion-tired: #f97316;
  --color-emotion-energetic: #22d3ee;

  /* Glow & Effects */
  --glow-happy: 0 0 20px rgba(251, 191, 36, 0.5);
  --glow-calm: 0 0 20px rgba(56, 189, 248, 0.5);
  --glow-anxious: 0 0 20px rgba(156, 163, 175, 0.4);
  --glow-sad: 0 0 20px rgba(124, 58, 237, 0.5);
  --glow-angry: 0 0 20px rgba(239, 68, 68, 0.5);
  --glow-lost: 0 0 20px rgba(226, 232, 240, 0.4);
  --glow-tired: 0 0 20px rgba(249, 115, 22, 0.5);
  --glow-energetic: 0 0 20px rgba(34, 211, 238, 0.5);

  /* Semantic */
  --color-border: rgba(148, 163, 184, 0.15);
  --color-border-active: rgba(56, 189, 248, 0.4);

  /* ===== Typography ===== */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;

  --text-xs: 0.625rem;    /* 10px */
  --text-sm: 0.75rem;     /* 12px */
  --text-base: 0.875rem;  /* 14px */
  --text-lg: 1rem;        /* 16px */
  --text-xl: 1.125rem;    /* 18px */
  --text-2xl: 1.25rem;    /* 20px */

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  /* ===== Spacing ===== */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* ===== Radius ===== */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ===== Shadows ===== */
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --shadow-card-hover: 0 8px 32px rgba(0, 0, 0, 0.4);
  --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.5);
}

/* ===== Typography Classes ===== */
.brand-heading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-subheading {
  font-family: var(--font-family);
  font-weight: var(--font-weight-semibold);
  line-height: var(--leading-tight);
  color: var(--color-text-primary);
}

.brand-body {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.brand-caption {
  font-family: var(--font-family);
  font-weight: var(--font-weight-normal);
  line-height: var(--leading-relaxed);
  color: var(--color-text-tertiary);
}

    </style>

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-bg-primary);
    --color-foreground: var(--color-text-primary);
    --color-card: var(--color-bg-card);
    --color-card-hover: var(--color-bg-card-hover);

    --color-primary-foreground: var(--color-text-inverse);

    --color-secondary-foreground: var(--color-text-primary);
    --color-muted: var(--color-bg-tertiary);
    --color-muted-foreground: var(--color-text-secondary);
    --color-accent: var(--color-purple);
    --color-accent-foreground: var(--color-text-primary);
    --color-border: var(--color-border);
    --color-ring: var(--color-sky);
    --radius-sm: var(--radius-sm);
    --radius-md: var(--radius-md);
    --radius-lg: var(--radius-lg);

  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>

    <!-- Custom CSS Animations (placed before </body> per hard rules) -->
    <style>
        /* Floating golden light particles */
        .sky-particle {
            position: absolute;
            border-radius: 9999px;
            background: rgba(251, 191, 36, 0.6);
            box-shadow: 0 0 6px rgba(251, 191, 36, 0.4);
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-40px) translateX(10px); opacity: 0.8; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-80px) translateX(-5px); opacity: 0; }
        }

        /* Neon flicker on city skyline bottom edge */
        .neon-edge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            animation: neonCycle 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes neonCycle {
            0% { background: var(--color-sky); box-shadow: 0 0 12px rgba(56, 189, 248, 0.5); }
            33% { background: var(--color-purple); box-shadow: 0 0 12px rgba(167, 139, 250, 0.5); }
            66% { background: var(--color-pink); box-shadow: 0 0 12px rgba(244, 114, 182, 0.5); }
            100% { background: var(--color-sky); box-shadow: 0 0 12px rgba(56, 189, 248, 0.5); }
        }

        /* Emotion icon base */
        .emotion-icon {
            width: 40px;
            height: 40px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: color-mix(in srgb, var(--emotion-color) 15%, transparent);
            border: 1.5px solid var(--emotion-color);
            transition: transform 240ms cubic-bezier(.3,0,0,1), box-shadow 240ms cubic-bezier(.3,0,0,1), background 160ms cubic-bezier(.2,.8,.2,1);
        }

        .emotion-icon.active {
            transform: scale(1.1);
            background: color-mix(in srgb, var(--emotion-color) 30%, transparent);
            box-shadow: var(--emotion-glow);
        }

        /* Emotion button hover */
        .emotion-btn:hover .emotion-icon {
            transform: scale(1.08);
        }
        .emotion-btn:active .emotion-icon {
            transform: scale(0.96);
        }

        /* Tab underline indicator */
        .tab-underline {
            width: 0;
            height: 2px;
            border-radius: 1px;
            transition: width 240ms cubic-bezier(.3,0,0,1);
        }

        .tab-btn.active .tab-underline {
            width: 16px;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .sky-particle,
            .neon-edge {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .emotion-icon,
            .tab-underline {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
